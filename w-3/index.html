<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Theme User Registration</title>
    <style>
        /* 1. Page Background - Solid Grey */
        body {
            background-color: #2e2e2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        /* 2. Form Container - Black/Grey Theme */
        .registration-card {
            background-color: #1a1a1a;
            /* Near black */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #444;
        }

        h2 {
            text-align: center;
            color: #bbb;
            margin-top: 0;
        }

        /* 3. Form Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
            background-color: #3d3d3d;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #555;
        }

        /* 4. Data List Area */
        .user-list {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .user-item {
            background: #222;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 5px solid #555;
        }

        .user-item strong {
            color: #007bff;
        }

        .user-item small {
            color: #888;
        }

        .clear-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="registration-card">
        <h2>Register</h2>
        <form id="userForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <button type="submit">Push to Data Array</button>
        </form>
    </div>

    <div class="user-list" id="displayArea"></div>

    <button id="clearBtn" class="clear-btn">Clear Local Storage</button>

    <script>
        const userForm = document.getElementById('userForm');
        const displayArea = document.getElementById('displayArea');
        const clearBtn = document.getElementById('clearBtn');

        // Load existing data from LocalStorage or start empty
        let apiDataArray = JSON.parse(localStorage.getItem('offlineDB')) || [];

        // Initial render
        renderData();

        userForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Create the user object
            const newUser = {
                id: Date.now(),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            };

            // Simulate "Pushing to API" by saving to LocalStorage
            apiDataArray.push(newUser);
            localStorage.setItem('offlineDB', JSON.stringify(apiDataArray));

            // UI Updates
            renderData();
            userForm.reset();
        });

        function renderData() {
            displayArea.innerHTML = '';

            apiDataArray.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                <strong>${user.name}</strong><br>
                <small>${user.email}</small>
            `;
                displayArea.appendChild(div);
            });
        }

        clearBtn.onclick = () => {
            localStorage.removeItem('offlineDB');
            apiDataArray = [];
            renderData();
        };
    </script>

</body>

</html>
