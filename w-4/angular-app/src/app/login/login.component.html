<div class="card">
    <h2>Login</h2>

    @if (error) { <p class="msg error">{{ error }}</p> }

    <div class="field">
        <label>Email</label>
        <input [(ngModel)]="email" type="email" placeholder="jane@example.com" />
    </div>
    <div class="field">
        <label>Password</label>
        <input [(ngModel)]="password" type="password" placeholder="••••••••" />
    </div>

    <button (click)="onSubmit()">Sign In</button>
    <p class="switch">No account? <a routerLink="/register">Register</a></p>
</div>
