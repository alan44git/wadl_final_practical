<div class="card">
    <h2>Register</h2>

    @if (error) { <p class="msg error">{{ error }}</p> }
    @if (success) { <p class="msg success">{{ success }}</p> }

    <div class="field">
        <label>Name</label>
        <input [(ngModel)]="name" type="text" placeholder="Jane Doe" />
    </div>
    <div class="field">
        <label>Email</label>
        <input [(ngModel)]="email" type="email" placeholder="jane@example.com" />
    </div>
    <div class="field">
        <label>Password</label>
        <input [(ngModel)]="password" type="password" placeholder="••••••••" />
    </div>

    <button (click)="onSubmit()">Create Account</button>
    <p class="switch">Already have an account? <a routerLink="/login">Login</a></p>
</div>
